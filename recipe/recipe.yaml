schema_version: 1

context:
  python_min: "3.11"
  name: cibuildwheel
  version: "4.0.0"
  noarch_prefix: ${{ 'unix' if unix else 'win' }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/pypa/cibuildwheel/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b25a4d281802b4363064000fc240e7b54a0387e26400b3ded9e1f8d23027b259

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - cibuildwheel = cibuildwheel.__main__:main

requirements:
  host:
    - hatchling
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - bashlex
    - bracex
    - certifi
    - dependency-groups
    - filelock
    - humanize
    - packaging
    - if: unix
      then:
        - __unix
        - patchelf
      else:
        - __win
    - platformdirs
    - pyelftools
    - python-build
    - wheel

tests:
  - files:
      source:
        - test/
    requirements:
      run:
        - pip
        - jinja2
        - pytest >=6
        - pytest-timeout
        - pytest-xdist
        - python-build
        - validate-pyproject
        - python ${{ python_min }}.*
        - if: unix
          then: patchelf
    script:
      - pip check
      - cibuildwheel --help
      - if: unix  # ~290s on Windows (too slow), all skipped on Linux
        then: pytest test/test_dependency_versions.py
      - pytest test/test_emulation.py  # 0.5s on Windows, all skipped on Linux
      - pytest test/test_macos_archs.py  # currently all skipped
      - pytest test/test_wheel_tag.py  # currently all skipped
      # If we include this one, we get a "Access is denied. (os error 5)" when trying
      # to clean up the tests:
      # pytest test/test_windows.py  # 82.31s on Windows, all skipped on Linux
  - python:
      imports:
        - cibuildwheel
      python_version: ${{ python_min }}.*
      pip_check: false

about:
  summary: Building wheels across Mac, Linux, Windows, on multiple versions of Python.
  description: |
    Python wheels are great. Building them across Mac, Linux, Windows,
    on multiple versions of Python, is not.
    cibuildwheel is here to help. cibuildwheel runs on your CI server -
    currently it supports GitHub Actions, Azure Pipelines, Travis CI,
    AppVeyor, CircleCI, and GitLab CI - and it builds and tests your
    wheels across all of your platforms.
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/pypa/cibuildwheel
  documentation: https://cibuildwheel.pypa.io/en/stable/

extra:
  recipe-maintainers:
    - henryiii
    - MementoRC
